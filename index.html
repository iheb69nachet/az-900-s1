<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz AZ-900 – Fondamentaux Azure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0078d4, #003a6d);
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 800px;
    background: #fff;
    margin: 40px auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
    color: #0078d4;
  }
  .question {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 15px;
  }
  .option {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #f7f7f7;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
  }
  .option:hover {
    background: #eef6ff;
    border-color: #0078d4;
  }
  .correct {
    background: #d4edda;
    border-color: #28a745;
  }
  .wrong {
    background: #f8d7da;
    border-color: #dc3545;
  }
  .next-btn {
    display: none;
    margin-top: 20px;
    padding: 12px 20px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
  }
  .next-btn:hover {
    background: #005fa3;
  }
  .progress {
    text-align: right;
    color: #555;
    margin-bottom: 10px;
  }
  .score {
    text-align: center;
    font-size: 22px;
  }
</style>
</head>

<body>
<div class="container">
  <h1>Quiz AZ-900</h1>
  <p style="text-align:center;color:#666">
    Fondamentaux Azure – 30 questions
  </p>

  <div id="quiz">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" id="nextBtn">Suivant</button>
  </div>

  <div class="score" id="score" style="display:none;"></div>
</div>

<script>
const questions = [
  // Cloud Concepts (15 questions)
  { q:"Qu'est-ce que le cloud computing ?", o:["Un réseau de câbles sous-marins","La fourniture de services informatiques via Internet","Un type de stockage physique","Un système d'exploitation"], a:1 },
  { q:"Quel est l'avantage principal du modèle de paiement à l'usage (Pay-as-you-go) ?", o:["Coûts fixes garantis","Paiement uniquement pour les ressources utilisées","Pas de facturation","Paiement annuel obligatoire"], a:1 },
  { q:"Qu'est-ce que l'élasticité dans le cloud ?", o:["La résistance aux pannes","La capacité d'ajuster automatiquement les ressources","La vitesse du réseau","Le nombre de datacenters"], a:1 },
  { q:"Quel type de cloud offre les ressources via Internet au grand public ?", o:["Cloud privé","Cloud hybride","Cloud public","Cloud personnel"], a:2 },
  { q:"Quel modèle cloud combine infrastructure sur site et cloud public ?", o:["Cloud privé","Cloud hybride","Cloud public","Multi-cloud"], a:1 },
  { q:"Dans quel modèle de service le client gère uniquement les applications et données ?", o:["IaaS","PaaS","SaaS","DaaS"], a:1 },
  { q:"Quel est un exemple de SaaS ?", o:["Azure Virtual Machines","Microsoft 365","Azure Storage","Windows Server"], a:1 },
  { q:"Dans IaaS, qui gère le système d'exploitation ?", o:["Microsoft","Le fournisseur cloud","Le client","Personne"], a:2 },
  { q:"Quel modèle nécessite le moins de gestion par le client ?", o:["IaaS","PaaS","SaaS","On-premises"], a:2 },
  { q:"Qu'est-ce que la haute disponibilité (High Availability) ?", o:["Stockage rapide","Garantie de temps de disponibilité du service","Prix bas","Grande capacité"], a:1 },
  { q:"Qu'est-ce que la scalabilité verticale ?", o:["Ajouter plus de machines","Augmenter la puissance d'une machine existante","Réduire les coûts","Changer de région"], a:1 },
  { q:"Qu'est-ce que la scalabilité horizontale ?", o:["Augmenter la RAM","Ajouter plus d'instances de machines","Changer de datacenter","Réduire le stockage"], a:1 },
  { q:"Quel concept fait référence à la tolérance aux pannes ?", o:["Scalability","Reliability","Elasticity","Agility"], a:1 },
  { q:"Quel avantage du cloud permet de déployer rapidement des ressources ?", o:["Économie d'échelle","Agilité","Géo-distribution","Élasticité"], a:1 },
  { q:"Les dépenses CapEx font référence à :", o:["Dépenses opérationnelles mensuelles","Investissements initiaux en infrastructure","Coûts variables","Abonnements logiciels"], a:1 },

  // Azure Architecture (10 questions)
  { q:"Qu'est-ce qu'une région Azure ?", o:["Un datacenter unique","Une zone géographique avec un ou plusieurs datacenters","Un type de VM","Un service réseau"], a:1 },
  { q:"Combien de zones de disponibilité minimum dans une région Azure ?", o:["1","2","3","5"], a:2 },
  { q:"À quoi servent les zones de disponibilité ?", o:["Réduire les coûts","Protéger contre les pannes de datacenter","Augmenter la vitesse","Gérer les utilisateurs"], a:1 },
  { q:"Qu'est-ce qu'une paire de régions (Region Pair) ?", o:["Deux datacenters dans une région","Deux régions dans la même géographie pour la réplication","Deux abonnements","Deux groupes de ressources"], a:1 },
  { q:"Quelle est la distance minimale entre deux régions appariées ?", o:["10 km","50 km","300 km","1000 km"], a:2 },
  { q:"Qu'est-ce qu'un groupe de ressources (Resource Group) ?", o:["Un ensemble d'abonnements","Un conteneur logique pour les ressources Azure","Un type de VM","Un service de stockage"], a:1 },
  { q:"Une ressource Azure peut appartenir à combien de groupes de ressources ?", o:["Plusieurs","Deux","Un seul","Illimité"], a:2 },
  { q:"Que se passe-t-il si vous supprimez un groupe de ressources ?", o:["Rien","Les ressources sont déplacées","Toutes les ressources sont supprimées","Les ressources sont archivées"], a:2 },
  { q:"Qu'est-ce qu'un abonnement Azure ?", o:["Un groupe de ressources","Une unité de gestion et de facturation","Une région","Un datacenter"], a:1 },
  { q:"Quel est le niveau le plus élevé dans la hiérarchie Azure ?", o:["Abonnement","Groupe de ressources","Groupe de gestion","Compte Azure"], a:2 },

  // Azure Services - Compute (8 questions)
  { q:"Quel service fournit des machines virtuelles dans Azure ?", o:["Azure Functions","Azure Virtual Machines","Azure App Service","Azure Container Instances"], a:1 },
  { q:"Quel service permet de déployer et gérer des conteneurs sans Kubernetes ?", o:["Azure VM","Azure Container Instances","Azure Kubernetes Service","Azure Batch"], a:1 },
  { q:"Quel service Azure est une plateforme pour exécuter des applications Kubernetes ?", o:["Azure Container Instances","Azure Kubernetes Service (AKS)","Azure VM Scale Sets","Azure Batch"], a:1 },
  { q:"Quel service permet d'exécuter du code sans gérer l'infrastructure (serverless) ?", o:["Azure VM","Azure Functions","Azure App Service","Azure Batch"], a:1 },
  { q:"Azure App Service est un service de type :", o:["IaaS","PaaS","SaaS","On-premises"], a:1 },
  { q:"Quel service permet la mise à l'échelle automatique des VM ?", o:["Azure Monitor","VM Scale Sets","Azure Backup","Azure Site Recovery"], a:1 },
  { q:"Quel est le SLA maximum pour une VM avec des zones de disponibilité ?", o:["99,9%","99,95%","99,99%","100%"], a:2 },
  { q:"Azure Virtual Desktop permet de :", o:["Créer des VM","Fournir des bureaux virtuels Windows","Gérer des containers","Surveiller les coûts"], a:1 },

  // Azure Services - Storage (7 questions)
  { q:"Quel service de stockage est utilisé pour les objets non structurés ?", o:["Azure Files","Azure Blob Storage","Azure Queue Storage","Azure Table Storage"], a:1 },
  { q:"Quel niveau de stockage Blob est le moins cher pour l'archivage ?", o:["Hot","Cool","Cold","Archive"], a:3 },
  { q:"Azure Files utilise quel protocole ?", o:["HTTP","FTP","SMB/NFS","SMTP"], a:2 },
  { q:"Quel service de stockage est optimal pour les disques de VM ?", o:["Blob Storage","Azure Managed Disks","Azure Files","Queue Storage"], a:1 },
  { q:"Les noms de compte de stockage Azure doivent être :", o:["Uniques par région","Uniques globalement","Sensibles à la casse","Jusqu'à 256 caractères"], a:1 },
  { q:"Quel service stocke des données NoSQL de type clé-valeur ?", o:["Azure SQL","Azure Cosmos DB","Azure Blob","Azure Queue"], a:1 },
  { q:"Quelle option de redondance réplique les données dans trois zones ?", o:["LRS","GRS","ZRS","RA-GRS"], a:2 },

  // Azure Services - Networking (5 questions)
  { q:"Qu'est-ce qu'Azure Virtual Network (VNet) ?", o:["Un service de stockage","Un réseau privé isolé dans Azure","Un type de VM","Un service de monitoring"], a:1 },
  { q:"Quel service contrôle le trafic réseau entrant et sortant ?", o:["Azure Firewall","Network Security Group (NSG)","Azure Load Balancer","Azure CDN"], a:1 },
  { q:"Quel service protège contre les attaques DDoS ?", o:["NSG","Azure DDoS Protection","Azure Firewall","VPN Gateway"], a:1 },
  { q:"Quel service connecte un réseau local à Azure de manière sécurisée ?", o:["Azure CDN","VPN Gateway","Azure DNS","Load Balancer"], a:1 },
  { q:"Azure ExpressRoute fournit :", o:["Connexion Internet publique","Connexion privée dédiée à Azure","Stockage cloud","Service de calcul"], a:1 },

  // Azure Services - Database (3 questions)
  { q:"Quel service fournit une base de données SQL entièrement gérée ?", o:["Azure VM avec SQL","Azure SQL Database","Azure Storage","Azure Cosmos DB"], a:1 },
  { q:"Azure Cosmos DB est une base de données :", o:["Relationnelle uniquement","NoSQL distribuée globalement","Fichier","En mémoire uniquement"], a:1 },
  { q:"Quel service est idéal pour MySQL et PostgreSQL managés ?", o:["Azure SQL Database","Azure Database for MySQL/PostgreSQL","Azure Cosmos DB","Azure Table Storage"], a:1 },

  // Azure Management & Governance (7 questions)
  { q:"Quel outil permet de déployer des ressources de manière reproductible ?", o:["Azure Portal","Azure Resource Manager (ARM) Templates","Azure CLI","PowerShell"], a:1 },
  { q:"Azure Policy permet de :", o:["Surveiller les coûts","Appliquer des règles de conformité","Créer des VM","Gérer le stockage"], a:1 },
  { q:"Azure Blueprints permet de :", o:["Dessiner des architectures","Déployer des environnements conformes prédéfinis","Surveiller les ressources","Gérer les coûts"], a:1 },
  { q:"Les balises (Tags) Azure sont principalement utilisées pour :", o:["La sécurité réseau","L'organisation et la gestion des coûts","La haute disponibilité","La réplication"], a:1 },
  { q:"Azure Monitor collecte quels types de données ?", o:["Uniquement les logs","Métriques et logs","Uniquement les coûts","Uniquement les alertes"], a:1 },
  { q:"Azure Advisor fournit :", o:["Des machines virtuelles","Des recommandations personnalisées","Du stockage","Des bases de données"], a:1 },
  { q:"Azure Service Health informe sur :", o:["Les coûts","L'état des services Azure et incidents","Les performances VM","Le stockage disponible"], a:1 },

  // Security & Compliance (5 questions)
  { q:"Quel service gère les identités et l'authentification ?", o:["Azure Firewall","Azure Active Directory (Azure AD)","NSG","Azure Policy"], a:1 },
  { q:"Qu'est-ce que l'authentification multifacteur (MFA) ?", o:["Un seul mot de passe","Plusieurs méthodes de vérification d'identité","Un type de chiffrement","Un service de stockage"], a:1 },
  { q:"Azure Security Center fournit :", o:["Des VM","Gestion unifiée de la sécurité et protection contre les menaces","Du stockage","Des bases de données"], a:1 },
  { q:"Quel principe de sécurité limite l'accès au minimum nécessaire ?", o:["Défense en profondeur","Principe du moindre privilège","Chiffrement","Authentification"], a:1 },
  { q:"Azure Key Vault est utilisé pour :", o:["Stocker des fichiers","Gérer des secrets, clés et certificats","Créer des VM","Surveiller les coûts"], a:1 }
];
let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const optEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const progressEl = document.getElementById("progress");

function loadQuestion() {
  answered = false;
  nextBtn.style.display = "none";
  optEl.innerHTML = "";
  progressEl.textContent = `Question ${index+1} sur ${questions.length}`;

  const q = questions[index];
  qEl.textContent = q.q;

  q.o.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, i);
    optEl.appendChild(btn);
  });
}

function selectAnswer(btn, i) {
  if (answered) return;
  answered = true;

  const correct = questions[index].a;
  document.querySelectorAll(".option").forEach((b, idx) => {
    b.disabled = true;
    if (idx === correct) b.classList.add("correct");
    if (idx === i && idx !== correct) b.classList.add("wrong");
  });

  if (i === correct) score++;
  nextBtn.style.display = "block";
}

nextBtn.onclick = () => {
  index++;
  if (index < questions.length) {
    loadQuestion();
  } else {
    showScore();
  }
};

function showScore() {
  document.getElementById("quiz").style.display = "none";
  scoreEl.style.display = "block";
  scoreEl.innerHTML = `
    <h2>Quiz terminé 🎉</h2>
    <p>Votre score : <strong>${score} / ${questions.length}</strong></p>
    <p>${Math.round((score/questions.length)*100)} %</p>
  `;
}

loadQuestion();
</script>
</body>
</html>
