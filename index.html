<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Data Week 3 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #a259ff;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --correct: #00e096;
    --wrong: #ff3d71;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(162,89,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid rgba(162,89,255,0.3);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-family: 'Space Mono', monospace;
  }

  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 32px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 40px;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent2));
    opacity: 0.7;
  }

  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .q-text {
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 28px;
    color: #fff;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    font-size: 15px;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent3);
    background: rgba(162,89,255,0.06);
    transform: translateX(4px);
  }

  .option-letter {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option:hover:not(.disabled) .option-letter {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(0,224,150,0.08);
  }

  .option.correct .option-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: #000;
  }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,61,113,0.08);
  }

  .option.wrong .option-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }

  .option.disabled { cursor: default; }

  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(0,224,150,0.08);
    border: 1px solid rgba(0,224,150,0.3);
    color: var(--correct);
  }

  .feedback.wrong-fb {
    background: rgba(255,61,113,0.08);
    border: 1px solid rgba(255,61,113,0.3);
    color: #ff8fab;
  }

  .feedback strong { color: #fff; }

  .btn-next {
    margin-top: 28px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    color: #000;
    cursor: pointer;
    display: none;
    transition: all 0.2s;
  }

  .btn-next:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(162,89,255,0.25);
  }

  .btn-next.show { display: block; animation: fadeUp 0.3s ease both; }

  .results {
    display: none;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .results.show { display: block; }

  .score-ring {
    width: 160px;
    height: 160px;
    margin: 0 auto 32px;
    position: relative;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring circle {
    fill: none;
    stroke-width: 8;
  }

  .score-ring .bg { stroke: var(--surface); }
  .score-ring .fill {
    stroke: var(--accent3);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
  }

  .score-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .score-num {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .score-denom {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .result-title {
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .result-msg {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    margin-bottom: 36px;
    line-height: 1.7;
    white-space: pre-line;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 36px;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .stat-val {
    font-size: 1.8rem;
    font-weight: 800;
    display: block;
    margin-bottom: 4px;
  }

  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-val.blue { color: var(--accent3); }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-restart {
    padding: 16px 48px;
    background: transparent;
    border: 2px solid var(--accent3);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--accent3);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-restart:hover {
    background: rgba(162,89,255,0.1);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(162,89,255,0.2);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 540px) {
    .quiz-card { padding: 24px 20px; }
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">Week 3</div>
    <h1>Big Data<br>Ecosystem Quiz</h1>
    <p class="subtitle">20 questions · Spark, Storage & Beyond</p>
  </header>

  <div id="quiz-area">
    <div class="progress-info">
      <span id="q-counter">Question 1 of 20</span>
      <span id="score-live">Score: 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="quiz-card" id="quiz-card">
      <div class="q-number" id="q-num">QUESTION 01</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="bg" cx="80" cy="80" r="68"/>
        <circle class="fill" id="ring-fill" cx="80" cy="80" r="68"
          stroke-dasharray="427" stroke-dashoffset="427"/>
      </svg>
      <div class="score-text">
        <div class="score-num" id="final-score">0</div>
        <div class="score-denom">/ 20</div>
      </div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="stats-grid">
      <div class="stat-box">
        <span class="stat-val green" id="stat-correct">0</span>
        <span class="stat-label">Correct</span>
      </div>
      <div class="stat-box">
        <span class="stat-val red" id="stat-wrong">0</span>
        <span class="stat-label">Wrong</span>
      </div>
      <div class="stat-box">
        <span class="stat-val blue" id="stat-pct">0%</span>
        <span class="stat-label">Accuracy</span>
      </div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">↺ Restart Quiz</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "What is the main performance problem with MapReduce that motivated the creation of Apache Spark?",
    options: [
      "MapReduce cannot run on more than 100 nodes",
      "MapReduce writes intermediate results to disk (HDFS) between every step",
      "MapReduce only supports the Python programming language",
      "MapReduce requires manual data partitioning by the developer"
    ],
    answer: 1,
    explanation: "MapReduce writes every Map and Reduce result to HDFS between steps, causing heavy disk I/O. This makes it very slow for iterative jobs that require many passes over the data."
  },
  {
    q: "How does Apache Spark achieve up to 100× speed improvement over MapReduce?",
    options: [
      "By using more powerful hardware and SSDs",
      "By running only on cloud infrastructure",
      "By keeping intermediate data in RAM instead of writing to disk between steps",
      "By skipping the Reduce phase entirely"
    ],
    answer: 2,
    explanation: "Spark's core idea is to keep intermediate data in RAM (memory) rather than writing it to disk between steps. This dramatically speeds up iterative algorithms."
  },
  {
    q: "What does RDD stand for in Apache Spark?",
    options: [
      "Remote Data Distribution",
      "Resilient Distributed Dataset",
      "Replicated Data Directory",
      "Rapid Data Deployment"
    ],
    answer: 1,
    explanation: "RDD stands for Resilient Distributed Dataset — the core abstraction in Spark. It is an immutable, distributed collection of objects spread across the cluster."
  },
  {
    q: "What does 'lazy evaluation' mean in the context of Spark RDDs?",
    options: [
      "Spark processes data slower to save resources",
      "Transformations are recorded but not executed until an Action is called",
      "RDDs are only created when the cluster has free memory",
      "Spark waits 60 seconds before executing any job"
    ],
    answer: 1,
    explanation: "Lazy evaluation means Spark records every transformation but does not execute any of them until an Action (like count, collect, or save) is triggered. This allows Spark to optimize the full pipeline."
  },
  {
    q: "What does DAG stand for in Spark's execution model?",
    options: [
      "Data Aggregation Grid",
      "Distributed Application Graph",
      "Directed Acyclic Graph",
      "Dynamic Allocation of GPUs"
    ],
    answer: 2,
    explanation: "DAG stands for Directed Acyclic Graph. Spark builds a DAG of all transformations before executing them, allowing it to optimize the entire pipeline and minimize data movement."
  },
  {
    q: "Which of the following is NOT part of the Spark ecosystem?",
    options: [
      "Spark SQL",
      "MLlib",
      "GraphX",
      "Spark YARN Manager"
    ],
    answer: 3,
    explanation: "The Spark ecosystem includes Spark SQL, Spark Streaming, MLlib (machine learning), and GraphX (graph computation). 'Spark YARN Manager' is not a Spark component — YARN is a separate Hadoop resource manager."
  },
  {
    q: "What is Apache Hive best described as?",
    options: [
      "A NoSQL database for real-time lookups",
      "A SQL-like query layer on top of HDFS that translates queries into MapReduce or Spark jobs",
      "A distributed message queue for streaming events",
      "A cloud object storage service"
    ],
    answer: 1,
    explanation: "Apache Hive adds a SQL-like query layer on top of HDFS. It translates SQL queries into MapReduce or Spark jobs, making it ideal for analysts who know SQL but don't want to write code."
  },
  {
    q: "How does Apache HBase differ from regular HDFS?",
    options: [
      "HBase stores data in the cloud while HDFS is on-premise",
      "HBase supports random read/write access, while HDFS is designed for write-once sequential access",
      "HBase compresses files using Parquet format automatically",
      "HBase replaces the NameNode with a distributed metadata service"
    ],
    answer: 1,
    explanation: "HDFS is designed for write-once, sequential access. HBase is a columnar NoSQL database built on HDFS that supports random read/write access — perfect for fast lookups by key like user profiles or sensor readings."
  },
  {
    q: "Which of the following is an example of Object Storage?",
    options: [
      "Apache HBase",
      "Apache Hive",
      "Amazon S3",
      "Apache Kafka"
    ],
    answer: 2,
    explanation: "Amazon S3 (Simple Storage Service) is a cloud-native object storage service. Others include Google Cloud Storage and Azure Blob. These are the cloud alternative to HDFS, increasingly used to decouple storage from computation."
  },
  {
    q: "What does OLTP stand for, and what is it used for?",
    options: [
      "Online Transfer Protocol — for moving data between clusters",
      "Online Transaction Processing — for managing day-to-day operational data",
      "Optimized Large Table Processing — for Big Data analytics",
      "Object-Level Transfer Pipeline — for cloud migrations"
    ],
    answer: 1,
    explanation: "OLTP stands for Online Transaction Processing. It is used for managing day-to-day operations like bank ATMs, e-commerce orders, and login systems, with short frequent reads/writes."
  },
  {
    q: "Which database type is best suited for running complex analytical queries over millions of rows of historical data?",
    options: [
      "OLTP — PostgreSQL or MySQL",
      "OLAP — Hive, BigQuery, or Snowflake",
      "HBase with random read access",
      "HDFS directly with MapReduce"
    ],
    answer: 1,
    explanation: "OLAP (Online Analytical Processing) systems like Hive, BigQuery, Redshift, and Snowflake are optimized for complex queries with aggregations, GROUP BY, and JOINs across millions of rows — ideal for BI dashboards and analytics."
  },
  {
    q: "What is Apache Kafka primarily used for?",
    options: [
      "Batch processing of nightly log files into HDFS",
      "Bridging relational databases with the Hadoop ecosystem",
      "Real-time event streaming — producers publish events to topics and consumers process them immediately",
      "Storing structured SQL tables in a columnar format"
    ],
    answer: 2,
    explanation: "Apache Kafka is a distributed message queue and event streaming platform. Producers publish events (clicks, transactions) to topics, and consumers subscribe and process them in real time — like a continuous conveyor belt of data."
  },
  {
    q: "What is Apache Flume designed to do?",
    options: [
      "Process SQL queries on top of HDFS",
      "Collect and move large volumes of log data (e.g. web server logs) into HDFS",
      "Stream real-time events between microservices",
      "Transfer tables from a relational database into Hadoop"
    ],
    answer: 1,
    explanation: "Apache Flume is a tool for collecting and moving large amounts of log data — like web server logs and application logs — into HDFS. It works like a bucket brigade, scooping logs from servers and pouring them into HDFS."
  },
  {
    q: "What problem does Apache Sqoop solve?",
    options: [
      "It speeds up MapReduce jobs by caching results in RAM",
      "It monitors cluster health and restarts failed containers",
      "It bridges relational databases (MySQL, PostgreSQL, Oracle) with Hadoop by transferring tables in and out",
      "It compresses HDFS files using Erasure Coding"
    ],
    answer: 2,
    explanation: "Apache Sqoop acts like a cable between old SQL databases and the Big Data world. It transfers tables from relational databases into HDFS or Hive and vice versa, making it useful for migrating legacy data."
  },
  {
    q: "What is the key difference between Batch Ingestion and Stream Ingestion?",
    options: [
      "Batch ingestion uses Kafka; stream ingestion uses Flume",
      "Batch collects data over time and processes it all at once; stream processes each event as it arrives in real time",
      "Batch ingestion only works for structured data; stream ingestion handles unstructured data",
      "Batch ingestion requires YARN; stream ingestion bypasses it"
    ],
    answer: 1,
    explanation: "Batch ingestion collects data over time and processes it all at once (like a nightly ETL job). Stream ingestion processes each event as it arrives in real time. Kafka is a streaming tool; Flume and Sqoop are typically used for batch."
  },
  {
    q: "In the Lambda Architecture, what does the Batch Layer do?",
    options: [
      "Processes only recent data with low latency and approximate results",
      "Merges real-time and historical views to answer user queries",
      "Reprocesses ALL historical data to produce accurate but slow results",
      "Routes incoming data to either the speed or serving layer"
    ],
    answer: 2,
    explanation: "The Batch Layer (e.g., Hadoop/Spark) reprocesses ALL historical data periodically. It produces highly accurate results but with high latency — results can take hours to compute."
  },
  {
    q: "In the Lambda Architecture, what is the purpose of the Speed Layer?",
    options: [
      "To permanently store all raw data for future reprocessing",
      "To process only recent data in real time for low-latency approximate results",
      "To serve pre-computed batch views to users",
      "To manage cluster resources across the entire system"
    ],
    answer: 1,
    explanation: "The Speed Layer (e.g., Kafka + Spark Streaming) processes only recent data in real time. Results are fast but approximate. It compensates for the high latency of the batch layer."
  },
  {
    q: "What is a Data Lake?",
    options: [
      "A structured data warehouse optimized for fast analytical queries",
      "A hybrid system combining a data warehouse and object storage",
      "A storage system that stores raw data in its original format — structured, semi-structured, and unstructured — all in one place",
      "A real-time stream processing platform like Kafka"
    ],
    answer: 2,
    explanation: "A Data Lake stores raw data in its original format — any type, any structure — usually in Object Storage like S3. No transformation is required upfront. It is cheap and flexible, but requires governance to avoid becoming a 'data swamp'."
  },
  {
    q: "How does a Data Warehouse differ from a Data Lake?",
    options: [
      "A Data Warehouse stores raw unprocessed data; a Data Lake stores only structured data",
      "A Data Warehouse stores cleaned, structured, transformed data optimized for fast analytics; a Data Lake stores raw data in any format",
      "A Data Warehouse uses Kafka for ingestion; a Data Lake uses Sqoop",
      "A Data Warehouse runs on HDFS; a Data Lake runs on YARN"
    ],
    answer: 1,
    explanation: "A Data Warehouse (e.g., Redshift, BigQuery, Snowflake) stores cleaned, structured, and transformed data optimized for fast analytical queries. A Data Lake stores raw data in any format. The Lakehouse combines both approaches."
  },
  {
    q: "Which technology represents the 'Lakehouse' architecture?",
    options: [
      "Apache Kafka and Apache Flume",
      "Amazon S3 and Google Cloud Storage",
      "Apache Delta Lake and Apache Iceberg",
      "Apache Sqoop and Apache Hive"
    ],
    answer: 2,
    explanation: "Technologies like Apache Delta Lake and Apache Iceberg implement the Lakehouse architecture — combining the low-cost raw storage of a Data Lake with the performance and ACID transaction support of a Data Warehouse."
  }
];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('q-num').textContent = `QUESTION ${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-counter').textContent = `Question ${current+1} of 20`;
  document.getElementById('score-live').textContent = `Score: ${score}`;
  document.getElementById('progress-bar').style.width = `${(current / 20) * 100}%`;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    div.onclick = () => selectOption(i);
    opts.appendChild(div);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';

  const card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.35s ease both'; });
}

function selectOption(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));

  const fb = document.getElementById('feedback');
  if (idx === q.answer) {
    score++;
    opts[idx].classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>✓ Correct!</strong> ${q.explanation}`;
  } else {
    opts[idx].classList.add('wrong');
    opts[q.answer].classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>✗ Not quite.</strong> ${q.explanation}`;
  }
  document.getElementById('score-live').textContent = `Score: ${score}`;
  document.getElementById('btn-next').className = 'btn-next show';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  const res = document.getElementById('results');
  res.classList.add('show');

  document.getElementById('final-score').textContent = score;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = 20 - score;
  document.getElementById('stat-pct').textContent = Math.round((score/20)*100) + '%';

  const pct = score / 20;
  const circumference = 427;
  const offset = circumference - (pct * circumference);
  setTimeout(() => {
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
    const fill = document.getElementById('ring-fill');
    if (pct >= 0.8) fill.style.stroke = '#00e096';
    else if (pct >= 0.5) fill.style.stroke = '#a259ff';
    else fill.style.stroke = '#ff3d71';
  }, 100);

  let title, msg;
  if (score === 20)      { title = "Perfect Score! 🏆"; msg = "Flawless. You've fully mastered the Modern Big Data Ecosystem.\nReady for hands-on Spark coding next week."; }
  else if (score >= 17)  { title = "Excellent! 🎉"; msg = "Outstanding performance. You have a strong grasp\nof Spark, storage layers, ingestion, and cloud architectures."; }
  else if (score >= 14)  { title = "Great Work! 👍"; msg = "Solid understanding. Review the few topics you missed\nand you'll be fully ready for Week 4."; }
  else if (score >= 10)  { title = "Good Effort 📚"; msg = "You know the basics. Go back through the Week 3 summary\nand revisit Lambda Architecture and storage types."; }
  else                   { title = "Keep Studying 💪"; msg = "The material takes time. Re-read the Week 3 slides\nand try again — you've got this."; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;
}

function restartQuiz() {
  current = 0;
  score = 0;
  document.getElementById('results').classList.remove('show');
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('ring-fill').style.strokeDashoffset = 427;
  loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
