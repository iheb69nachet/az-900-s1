<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AZ-900 Quiz – Azure Fundamentals</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0078d4, #003a6d);
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 900px;
    background: #fff;
    margin: 40px auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
    color: #0078d4;
  }
  .question {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 15px;
  }
  .option {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #f7f7f7;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
  }
  .option:hover {
    background: #eef6ff;
    border-color: #0078d4;
  }
  .correct {
    background: #d4edda;
    border-color: #28a745;
  }
  .wrong {
    background: #f8d7da;
    border-color: #dc3545;
  }
  .next-btn {
    display: none;
    margin-top: 20px;
    padding: 12px 20px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
  }
  .next-btn:hover {
    background: #005fa3;
  }
  .progress {
    text-align: right;
    color: #555;
    margin-bottom: 10px;
  }
  .score {
    text-align: center;
    font-size: 22px;
  }
</style>
</head>

<body>
<div class="container">
  <h1>AZ-900 Quiz</h1>
  <p style="text-align:center;color:#666">
    Azure Fundamentals – 45 Questions
  </p>

  <div id="quiz">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" id="nextBtn">Next</button>
  </div>

  <div class="score" id="score" style="display:none;"></div>
</div>

<script>
const questions = [
  { q:"What is cloud elasticity?", o:["Fixed pricing","Manual scaling","On-demand scaling","Single server usage"], a:2 },
  { q:"Which cloud model requires the most customer management?", o:["SaaS","PaaS","IaaS","Serverless"], a:2 },
  { q:"What is an Azure Region?", o:["One VM","A data center","A geographic area with data centers","A subnet"], a:2 },
  { q:"Availability Zones protect against:", o:["Region failure","Datacenter failure","Network failure only","Cost increase"], a:1 },
  { q:"How many Availability Zones are typically in a region?", o:["1","2","3","10"], a:2 },
  { q:"Which service provides virtual servers?", o:["App Service","Virtual Machines","Functions","Blob Storage"], a:1 },
  { q:"Which scaling increases VM size?", o:["Horizontal","Vertical","Elastic","Auto"], a:1 },
  { q:"Which scaling adds VM instances?", o:["Vertical","Manual","Horizontal","Static"], a:2 },
  { q:"Which service provides automatic VM scaling?", o:["App Service","VM Scale Sets","Monitor","Storage"], a:1 },
  { q:"Which availability can be achieved with multi-AZ VMs?", o:["99.5%","99.9%","99.95%","99.99%"], a:3 },

  { q:"Which service is PaaS?", o:["VM","App Service","Disk","VNet"], a:1 },
  { q:"Who manages OS updates in PaaS?", o:["Customer","Azure","Partner","No one"], a:1 },
  { q:"Which is object storage?", o:["Disks","Files","Blob Storage","Tables"], a:2 },
  { q:"Best storage for VM OS disks?", o:["Blob","Files","Disks","Queues"], a:2 },
  { q:"Cheapest blob tier for long-term storage?", o:["Hot","Cool","Cold","Archive"], a:3 },
  { q:"Storage account names must be:", o:["Unique per RG","Unique per region","Globally unique","Case-sensitive"], a:2 },
  { q:"Azure private networking service?", o:["DNS","VNet","CDN","Monitor"], a:1 },
  { q:"What divides a VNet?", o:["Regions","Zones","Subnets","Firewalls"], a:2 },
  { q:"Controls inbound and outbound traffic?", o:["Firewall","NSG","DDoS","VPN"], a:1 },
  { q:"Protects against large-scale attacks?", o:["NSG","Monitor","DDoS Protection","VPN"], a:2 },

  { q:"What is a Resource Group?", o:["Billing unit","Logical container","Subscription","Region"], a:1 },
  { q:"A resource belongs to how many RGs?", o:["Multiple","Two","One","Unlimited"], a:2 },
  { q:"Deleting a resource group:", o:["Keeps resources","Moves resources","Deletes resources","Archives resources"], a:2 },
  { q:"Primary billing boundary?", o:["Region","RG","Subscription","VNet"], a:2 },
  { q:"Can subscriptions be merged?", o:["Yes","No","Only paid","Only free"], a:1 },
  { q:"Highest level in hierarchy?", o:["Subscription","RG","Management Group","Resource"], a:2 },
  { q:"Tags are mainly for:", o:["Security","Networking","Cost management","Availability"], a:2 },
  { q:"Least customer responsibility?", o:["IaaS","PaaS","SaaS","VM"], a:2 },
  { q:"Azure App Service best for:", o:["Databases","VM hosting","Web apps","Networking"], a:2 },
  { q:"Required before creating resources?", o:["VNet","Storage","Subscription","Region"], a:2 },

  { q:"Who is responsible for physical datacenter security?", o:["Customer","Microsoft","Partner","Government"], a:1 },
  { q:"Where can compliance reports be accessed?", o:["Azure Portal","Trust Center","Service Trust Portal","Docs"], a:2 },
  { q:"GDPR focuses on:", o:["Security","Performance","Personal data protection","Availability"], a:2 },
  { q:"ISO is:", o:["A law","A cloud provider","A standards organization","A service"], a:2 },
  { q:"What data does GDPR protect?", o:["Financial","Public","PII","Encrypted"], a:2 },
  { q:"Who controls data location selection?", o:["Microsoft","Customer","ISO","Azure Policy"], a:1 },
  { q:"Which service controls compliance rules?", o:["Azure Monitor","Azure Policy","NSG","DDoS"], a:1 },
  { q:"Which dashboard shows compliance status?", o:["Cost Mgmt","Security Center","Regulatory Compliance","Monitor"], a:2 },
  { q:"What allows Microsoft access approval?", o:["RBAC","Customer Lockbox","Policy","NSG"], a:1 },
  { q:"Data is protected using:", o:["Backups","Tags","Encryption","Regions"], a:2 },

  { q:"What protects data during transfer?", o:["Firewall","Encryption in transit","NSG","DDoS"], a:1 },
  { q:"What ensures data stored is protected?", o:["Backup","Encryption at rest","Policy","Tags"], a:1 },
  { q:"Privacy terms are detailed in:", o:["SLA","Trust Center","Privacy Statement","Docs"], a:2 },
  { q:"Shared responsibility means:", o:["Azure manages all","Customer manages all","Responsibilities are shared","No security"], a:2 },
  { q:"Compliance requirements are:", o:["Microsoft only","Customer only","Shared","Optional"], a:2 }
];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const optEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const progressEl = document.getElementById("progress");

function loadQuestion() {
  answered = false;
  nextBtn.style.display = "none";
  optEl.innerHTML = "";
  progressEl.textContent = `Question ${index+1} of ${questions.length}`;
  const q = questions[index];
  qEl.textContent = q.q;

  q.o.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, i);
    optEl.appendChild(btn);
  });
}

function selectAnswer(btn, i) {
  if (answered) return;
  answered = true;
  const correct = questions[index].a;

  document.querySelectorAll(".option").forEach((b, idx) => {
    b.disabled = true;
    if (idx === correct) b.classList.add("correct");
    if (idx === i && idx !== correct) b.classList.add("wrong");
  });

  if (i === correct) score++;
  nextBtn.style.display = "block";
}

nextBtn.onclick = () => {
  index++;
  if (index < questions.length) loadQuestion();
  else showScore();
};

function showScore() {
  document.getElementById("quiz").style.display = "none";
  scoreEl.style.display = "block";
  scoreEl.innerHTML = `
    <h2>Quiz Completed 🎉</h2>
    <p><strong>${score} / ${questions.length}</strong></p>
    <p>${Math.round((score/questions.length)*100)}%</p>
  `;
}

loadQuestion();
</script>
</body>
</html>
