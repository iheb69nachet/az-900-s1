<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz AZ-900 – Fondamentaux Azure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0078d4, #003a6d);
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 800px;
    background: #fff;
    margin: 40px auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
    color: #0078d4;
  }
  .question {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 15px;
  }
  .option {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #f7f7f7;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
  }
  .option:hover {
    background: #eef6ff;
    border-color: #0078d4;
  }
  .correct {
    background: #d4edda;
    border-color: #28a745;
  }
  .wrong {
    background: #f8d7da;
    border-color: #dc3545;
  }
  .next-btn {
    display: none;
    margin-top: 20px;
    padding: 12px 20px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
  }
  .next-btn:hover {
    background: #005fa3;
  }
  .progress {
    text-align: right;
    color: #555;
    margin-bottom: 10px;
  }
  .score {
    text-align: center;
    font-size: 22px;
  }
</style>
</head>

<body>
<div class="container">
  <h1>Quiz AZ-900</h1>
  <p style="text-align:center;color:#666">
    Fondamentaux Azure – 30 questions
  </p>

  <div id="quiz">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" id="nextBtn">Suivant</button>
  </div>

  <div class="score" id="score" style="display:none;"></div>
</div>

<script>
const questions = [
{ q:"Quel est l’avantage principal des paires de régions Azure ?", o:["Réduction des coûts","Mises à jour simultanées","Isolation des pannes régionales","Accès Internet plus rapide"], a:2 },

{ q:"Quelle affirmation est vraie concernant les Availability Zones ?", o:["Elles existent dans toutes les régions Azure","Elles partagent la même alimentation électrique","Elles sont interconnectées par un réseau à faible latence","Elles remplacent les régions"], a:2 },

{ q:"Quelle configuration offre une disponibilité de 99,99 % pour des VM ?", o:["Une VM avec SSD Premium","Deux VM dans un Availability Set","Deux VM dans des Availability Zones","Une VM avec sauvegarde"], a:2 },

{ q:"Quel service Azure permet de gérer jusqu’à 1000 VM avec auto-scaling ?", o:["Availability Set","Azure App Service","Virtual Machine Scale Sets","Azure Container Instances"], a:2 },

{ q:"Quelle responsabilité reste au client dans un modèle PaaS ?", o:["Mises à jour du système d’exploitation","Disponibilité de la plateforme","Code applicatif","Correctifs de sécurité"], a:2 },

{ q:"Quel service est le plus adapté pour exécuter un conteneur unique rapidement ?", o:["AKS","Azure App Service","Azure Container Instances","Service Fabric"], a:2 },

{ q:"Quel composant est essentiel pour une architecture microservices à grande échelle ?", o:["Azure VM","Availability Set","Orchestrateur de conteneurs","Azure Files"], a:2 },

{ q:"Quelle caractéristique distingue Azure Functions ?", o:["Facturation par VM","Serveurs dédiés","Facturation à l’exécution","Système d’exploitation personnalisable"], a:2 },

{ q:"Quel type de service cloud est Microsoft 365 ?", o:["IaaS","PaaS","SaaS","FaaS"], a:2 },

{ q:"Quel service offre une connectivité privée sans passer par Internet ?", o:["VPN site-à-site","Azure Bastion","Azure ExpressRoute","Peering VNet"], a:2 },

{ q:"Quelle solution protège au niveau couche 7 (application) ?", o:["NSG","Azure DDoS Basic","Web Application Firewall","Azure Firewall"], a:2 },

{ q:"Quelle affirmation concernant NSG est correcte ?", o:["Il est externe au VNet","Il agit avant Azure Firewall","Il filtre le trafic entrant et sortant","Il remplace Azure Firewall"], a:2 },

{ q:"Quel service permet un accès privé à Azure SQL depuis un VNet ?", o:["Service Endpoint","Azure Firewall","Azure Private Link","Peering VNet"], a:2 },

{ q:"Quel est le rôle principal d’Azure Bastion ?", o:["Load balancing","Accès sécurisé aux VM","Protection DDoS","Peering réseau"], a:1 },

{ q:"Quel type de stockage est utilisé par les disques de VM ?", o:["Objet","Fichier","Bloc","Archive"], a:2 },

{ q:"Quel stockage est idéal pour des fichiers rarement consultés sur le long terme ?", o:["Hot","Cool","Archive","Premium"], a:2 },

{ q:"Quel niveau de stockage Blob a la latence la plus élevée ?", o:["Hot","Cool","Cold","Archive"], a:3 },

{ q:"Quelle option permet l’accès en lecture à une région secondaire ?", o:["GRS","ZRS","RA-GRS","LRS"], a:2 },

{ q:"Quel service est recommandé pour le Big Data analytique ?", o:["Azure Files","Azure SQL","Azure Data Lake Gen2","Azure Tables"], a:2 },

{ q:"Quel compte de stockage offre la plus faible latence ?", o:["Standard","Premium","GRS","Archive"], a:1 },

{ q:"Quel service permet de synchroniser des fichiers on-prem avec Azure ?", o:["Azure Files","Azure File Sync","Blob Sync","Azure Backup"], a:1 },

{ q:"Quelle affirmation sur les comptes de stockage est vraie ?", o:["Le nom est unique par groupe de ressources","Le nom est unique par abonnement","Le nom est unique globalement","Le nom est unique par région"], a:2 },

{ q:"Quel outil CLI permet de copier massivement des données vers Azure Storage ?", o:["Azure CLI","Azure Storage Explorer","AzCopy","PowerShell"], a:2 },

{ q:"Quel service découple les applications via messagerie ?", o:["Azure Tables","Azure Blobs","Azure Queues","Azure Files"], a:2 },

{ q:"Quel composant Azure isole logiquement les ressources ?", o:["Souscription","Groupe de ressources","Réseau virtuel","Région"], a:2 },

{ q:"Quelle ressource peut appartenir à plusieurs groupes de ressources ?", o:["VM","Stockage","Aucune","Réseau"], a:2 },

{ q:"Que se passe-t-il lors de la suppression d’un groupe de ressources ?", o:["Les ressources sont déplacées","Les ressources sont arrêtées","Toutes les ressources sont supprimées","Rien"], a:2 },

{ q:"Quel niveau gère les politiques sur plusieurs abonnements ?", o:["Ressource","Groupe de ressources","Abonnement","Groupe de gestion"], a:3 },

{ q:"Quelle affirmation sur les abonnements est correcte ?", o:["Ils peuvent être fusionnés","Ils ont des quotas","Ils sont gratuits","Ils sont régionaux"], a:1 },

{ q:"Quel modèle cloud combine on-prem et cloud public ?", o:["Privé","Public","Hybride","Multi-tenant"], a:2 },

{ q:"Quel service Azure est spécifique à la gestion hybride ?", o:["Azure Monitor","Azure Arc","Azure Policy","Azure Backup"], a:1 },

{ q:"Quel service protège automatiquement contre les attaques réseau courantes ?", o:["Azure Firewall","WAF","DDoS Basic","NSG"], a:2 },

{ q:"Quel service permet une gestion centralisée de sécurité réseau ?", o:["NSG","Azure Firewall","VNet","Peering"], a:1 },

{ q:"Quel service est facturé uniquement à l’exécution ?", o:["VM","App Service","Azure Functions","AKS"], a:2 },

{ q:"Quel modèle cloud offre le moins de contrôle sur l’infrastructure ?", o:["IaaS","PaaS","SaaS","Hybride"], a:2 },

{ q:"Quelle responsabilité appartient toujours au client ?", o:["Sécurité physique","Disponibilité datacenter","Gestion des accès","Redondance matérielle"], a:2 },

{ q:"Quel service permet le déploiement sans temps d’arrêt de conteneurs ?", o:["ACI","VM","AKS","Azure Files"], a:2 },

{ q:"Quel service est le mieux adapté pour une application événementielle ?", o:["VM","App Service","Azure Functions","Service Fabric"], a:2 },

{ q:"Quelle option VPN chiffre le trafic via Internet ?", o:["ExpressRoute","Peering","Site-to-Site VPN","Private Link"], a:2 },

{ q:"Quelle option offre la plus grande bande passante ?", o:["VPN","Peering","ExpressRoute","Bastion"], a:2 },

{ q:"Quel service Azure est considéré FaaS ?", o:["App Service","Functions","AKS","VM"], a:1 },

{ q:"Quel élément n’est PAS une responsabilité Azure en IaaS ?", o:["Sécurité du datacenter","Matériel","Système d’exploitation","Réseau physique"], a:2 },

{ q:"Quel service est recommandé pour héberger une API REST managée ?", o:["VM","Azure App Service","Azure Files","Azure Backup"], a:1 },

{ q:"Quel composant empêche l’accès direct à une base de données depuis Internet ?", o:["NSG","Private Endpoint","Load Balancer","Availability Set"], a:1 },

{ q:"Quelle solution permet d’éviter les coûts pendant zéro trafic ?", o:["VM réservée","App Service","Azure Functions","AKS"], a:2 },

{ q:"Quel service permet de gérer VMware on-prem depuis Azure ?", o:["Azure Stack","Azure Arc","Azure Backup","Azure Monitor"], a:1 },

{ q:"Quelle option offre la meilleure tolérance aux pannes régionales ?", o:["LRS","ZRS","GRS","RA-GZRS"], a:3 }
]

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const optEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const progressEl = document.getElementById("progress");

function loadQuestion() {
  answered = false;
  nextBtn.style.display = "none";
  optEl.innerHTML = "";
  progressEl.textContent = `Question ${index+1} sur ${questions.length}`;

  const q = questions[index];
  qEl.textContent = q.q;

  q.o.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, i);
    optEl.appendChild(btn);
  });
}

function selectAnswer(btn, i) {
  if (answered) return;
  answered = true;

  const correct = questions[index].a;
  document.querySelectorAll(".option").forEach((b, idx) => {
    b.disabled = true;
    if (idx === correct) b.classList.add("correct");
    if (idx === i && idx !== correct) b.classList.add("wrong");
  });

  if (i === correct) score++;
  nextBtn.style.display = "block";
}

nextBtn.onclick = () => {
  index++;
  if (index < questions.length) {
    loadQuestion();
  } else {
    showScore();
  }
};

function showScore() {
  document.getElementById("quiz").style.display = "none";
  scoreEl.style.display = "block";
  scoreEl.innerHTML = `
    <h2>Quiz terminé 🎉</h2>
    <p>Votre score : <strong>${score} / ${questions.length}</strong></p>
    <p>${Math.round((score/questions.length)*100)} %</p>
  `;
}

loadQuestion();
</script>
</body>
</html>
