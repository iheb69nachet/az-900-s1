    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0078d4, #003a6d);
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 800px;
    background: #fff;
    margin: 40px auto;
    padding: 30px;

    box-shadow: 0 15px 40px rgba(0,0,0,0.2);

  }
  .option {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #f7f7f7;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
  }
  .option:hover {
    background: #eef6ff;
    border-color: #0078d4;
  }
  .correct {
    background: #d4edda;
    border-color: #28a745;
  }
  .wrong {
    background: #f8d7da;
    border-color: #dc3545;
  }
  .next-btn {
    display: none;
    margin-top: 20px;
    padding: 12px 20px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
  }
  .next-btn:hover {
    background: #005fa3;
  }
  .progress {
    text-align: right;
    color: #555;
    margin-bottom: 10px;
  }
  .score {
    text-align: center;
    font-size: 22px;
  }
</style>

    <div id="options"></div>
    <button class="next-btn" id="nextBtn">Suivant</button>
  </div>

  <div class="score" id="score" style="display:none;"></div>
</div>

const questions = [
  { q:"Quel est le principal objectif du cloud computing ?", o:["Remplacer Internet","Fournir des ressources informatiques à la demande","Créer des logiciels","Stocker uniquement des fichiers"], a:1 },
  { q:"Quel type de cloud est partagé entre plusieurs organisations ?", o:["Cloud privé","Cloud hybride","Cloud public","Cloud local"], a:2 },
  { q:"Quel type de cloud est dédié à une seule organisation ?", o:["Cloud public","Cloud privé","Cloud communautaire","Cloud hybride"], a:1 },
  { q:"Le cloud hybride combine :", o:["Cloud public et privé","Deux clouds publics","Deux régions","Deux abonnements"], a:0 },
  { q:"Quel est un exemple de service SaaS ?", o:["Azure Virtual Machine","Azure SQL Database","Microsoft 365","Azure Storage"], a:2 },

  { q:"Quel service Azure permet d’exécuter du code sans gérer de serveur ?", o:["Azure VM","Azure Functions","Azure App Service","Azure Kubernetes"], a:1 },
  { q:"Quel service est utilisé pour gérer des conteneurs Kubernetes ?", o:["Azure VM","Azure Container Registry","Azure Kubernetes Service","Azure App Service"], a:2 },
  { q:"Quel avantage principal offre la haute disponibilité ?", o:["Réduction des coûts","Meilleure sécurité","Continuité du service","Plus de stockage"], a:2 },
  { q:"Quel mécanisme Azure permet la reprise après sinistre ?", o:["Scalabilité","Réplication","Sauvegarde","Surveillance"], a:1 },
  { q:"Quel service Azure est utilisé pour sauvegarder des données ?", o:["Azure Monitor","Azure Backup","Azure Advisor","Azure Firewall"], a:1 },

  { q:"Quelle ressource est nécessaire pour créer une machine virtuelle ?", o:["Groupe de gestion","Abonnement","Région","Compte utilisateur"], a:1 },
  { q:"Quel élément définit où une ressource est déployée ?", o:["Abonnement","Groupe de ressources","Région","Balise"], a:2 },
  { q:"Quel service Azure fournit des bases de données relationnelles managées ?", o:["Azure VM","Azure Blob Storage","Azure SQL Database","Azure Files"], a:2 },
  { q:"Quel service est utilisé pour surveiller les performances ?", o:["Azure Advisor","Azure Monitor","Azure Security Center","Azure Backup"], a:1 },
  { q:"Quel service donne des recommandations Azure ?", o:["Azure Monitor","Azure Advisor","Azure Firewall","Azure Policy"], a:1 },

  { q:"Quel type de stockage est accessible via SMB ?", o:["Azure Blob","Azure Files","Azure Disks","Azure Tables"], a:1 },
  { q:"Quel service Azure est utilisé pour stocker des messages ?", o:["Azure Files","Azure Queues","Azure Tables","Azure Disks"], a:1 },
  { q:"Quel service permet de contrôler l’accès aux ressources ?", o:["Azure Policy","Azure Monitor","Azure Backup","Azure CDN"], a:0 },
  { q:"Quel service gère les identités et accès dans Azure ?", o:["Azure IAM","Azure Active Directory","Azure DNS","Azure Firewall"], a:1 },
  { q:"Quel concept repose sur le principe du moindre privilège ?", o:["Scalabilité","Haute disponibilité","Sécurité","Facturation"], a:2 },

  { q:"Quel service protège les applications web contre les attaques ?", o:["Azure VPN","Azure Firewall","Web Application Firewall (WAF)","NSG"], a:2 },
  { q:"Quel outil permet de restreindre les types de ressources créées ?", o:["Azure Monitor","Azure Policy","Azure Advisor","Azure Backup"], a:1 },
  { q:"Quel élément permet de regrouper des abonnements ?", o:["Groupe de ressources","Région","Groupe de gestion","Balise"], a:2 },
  { q:"Quel élément est utilisé pour organiser les coûts ?", o:["Régions","Balises (Tags)","VNets","Zones"], a:1 },
  { q:"Quel modèle de tarification Azure est utilisé ?", o:["Paiement fixe","Paiement à l’usage","Abonnement annuel obligatoire","Licence unique"], a:1 },

  { q:"Quel service Azure est utilisé pour connecter un réseau local à Azure ?", o:["Azure CDN","Azure VPN Gateway","Azure Firewall","Azure DNS"], a:1 },
  { q:"Quel service fournit un réseau de diffusion de contenu ?", o:["Azure Monitor","Azure CDN","Azure VNet","Azure ExpressRoute"], a:1 },
  { q:"Quel service permet une connexion privée dédiée à Azure ?", o:["Azure VPN","Azure ExpressRoute","Azure Firewall","Azure CDN"], a:1 },
  { q:"Quel est l’objectif principal de la conformité ?", o:["Performance","Sécurité","Respect des normes légales","Réduction des coûts"], a:2 }
];
let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const optEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const progressEl = document.getElementById("progress");

function loadQuestion() {
  answered = false;
  nextBtn.style.display = "none";
  optEl.innerHTML = "";
  progressEl.textContent = `Question ${index+1} sur ${questions.length}`;

  const q = questions[index];
  qEl.textContent = q.q;

  q.o.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, i);
    optEl.appendChild(btn);
  });
}

function selectAnswer(btn, i) {
  if (answered) return;
  answered = true;

  const correct = questions[index].a;
  document.querySelectorAll(".option").forEach((b, idx) => {
    b.disabled = true;
    if (idx === correct) b.classList.add("correct");
    if (idx === i && idx !== correct) b.classList.add("wrong");
  });

  if (i === correct) score++;
  nextBtn.style.display = "block";
}

nextBtn.onclick = () => {
  index++;
  if (index < questions.length) {
    loadQuestion();
  } else {
    showScore();
  }
};

function showScore() {
  document.getElementById("quiz").style.display = "none";
  scoreEl.style.display = "block";
  scoreEl.innerHTML = `
    <h2>Quiz terminé 🎉</h2>
    <p>Votre score : <strong>${score} / ${questions.length}</strong></p>
    <p>${Math.round((score/questions.length)*100)} %</p>
  `;
}

loadQuestion();
</script>
