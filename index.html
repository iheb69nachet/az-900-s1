  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0078d4, #003a6d);
    margin: 0;

  }
  .container {
    max-width: 800px;
    background: #fff;
    margin: 40px auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);

  h1 {
    text-align: center;
    color: #0078d4;

  }
  .option {

    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #f7f7f7;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
  }
  .option:hover {
    background: #eef6ff;
    border-color: #0078d4;
  }
  .correct {
    background: #d4edda;
    border-color: #28a745;
  }
  .wrong {
    background: #f8d7da;
    border-color: #dc3545;
  }
  .next-btn {
    display: none;
    margin-top: 20px;
    padding: 12px 20px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
  }
  .next-btn:hover {
    background: #005fa3;
  }
  .progress {
    text-align: right;
    color: #555;
    margin-bottom: 10px;
  }
  .score {
    text-align: center;

</style>

    <button class="next-btn" id="nextBtn">Suivant</button>
  </div>

  <div class="score" id="score" style="display:none;"></div>
</div>

const questions = [
  { q:"Quel est le rôle principal d’Azure Resource Manager (ARM) ?", o:["Gérer la facturation","Déployer et gérer des ressources","Surveiller les performances","Sécuriser les identités"], a:1 },
  { q:"Quel service permet d’automatiser des tâches sans écrire beaucoup de code ?", o:["Azure Logic Apps","Azure VM","Azure SQL","Azure Monitor"], a:0 },
  { q:"Quel service Azure fournit une authentification unique (SSO) ?", o:["Azure Firewall","Azure Active Directory","Azure Policy","Azure Advisor"], a:1 },
  { q:"Quel service est utilisé pour la gestion des secrets et certificats ?", o:["Azure Monitor","Azure Key Vault","Azure Backup","Azure Storage"], a:1 },

  { q:"Quel type de stockage est le plus adapté aux données non structurées ?", o:["Azure Files","Azure Disks","Azure Blob","Azure Tables"], a:2 },

  { q:"Quel service Azure fournit un pare-feu managé ?", o:["NSG","Azure Firewall","Azure VPN","Azure CDN"], a:1 },

  { q:"Quel est l’objectif principal de la gouvernance Azure ?", o:["Performance","Organisation et contrôle","Stockage","Scalabilité"], a:1 },
  { q:"Quel service Azure permet la journalisation centralisée ?", o:["Azure Monitor","Azure Log Analytics","Azure Advisor","Azure Firewall"], a:1 },
  { q:"Quel service permet de distribuer le trafic HTTP ?", o:["Azure VPN","Azure Load Balancer","Azure Application Gateway","Azure DNS"], a:2 },
  { q:"Quel service Azure permet d’appliquer des standards de conformité ?", o:["Azure Policy","Azure Monitor","Azure Backup","Azure CDN"], a:0 },

  { q:"Quel service Azure est utilisé pour le stockage d’archives ?", o:["Hot Blob","Cool Blob","Archive Blob","Azure Files"], a:2 },
  { q:"Quel outil permet de visualiser les ressources Azure ?", o:["Azure CLI","Azure Portal","PowerShell","ARM Templates"], a:1 },
  { q:"Quel service Azure fournit une solution PaaS ?", o:["Azure VM","Azure App Service","Azure Disk","Azure VNet"], a:1 },
  { q:"Quel est le principal avantage du cloud public ?", o:["Contrôle total","Coûts élevés","Scalabilité","Maintenance manuelle"], a:2 }
];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const optEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const progressEl = document.getElementById("progress");

function loadQuestion() {
  answered = false;
  nextBtn.style.display = "none";
  optEl.innerHTML = "";
  progressEl.textContent = `Question ${index+1} sur ${questions.length}`;

  const q = questions[index];
  qEl.textContent = q.q;

  q.o.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, i);
    optEl.appendChild(btn);
  });
}

function selectAnswer(btn, i) {
  if (answered) return;
  answered = true;

  const correct = questions[index].a;
  document.querySelectorAll(".option").forEach((b, idx) => {
    b.disabled = true;
    if (idx === correct) b.classList.add("correct");
    if (idx === i && idx !== correct) b.classList.add("wrong");
  });

  if (i === correct) score++;
  nextBtn.style.display = "block";
}

nextBtn.onclick = () => {
  index++;
  if (index < questions.length) {
    loadQuestion();
  } else {
    showScore();
  }
};

function showScore() {
  document.getElementById("quiz").style.display = "none";
  scoreEl.style.display = "block";
  scoreEl.innerHTML = `
    <h2>Quiz terminé 🎉</h2>
    <p>Votre score : <strong>${score} / ${questions.length}</strong></p>
    <p>${Math.round((score/questions.length)*100)} %</p>
  `;
}

loadQuestion();
</script>
